<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI 確定申告アシスタント</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: linear-gradient(135deg, #f0f4ff 0%, #e8f5f0 100%); min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%); padding: 28px 20px 24px; text-align: center; }
.header-inner { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
.header-icon { background: rgba(255,255,255,0.2); border-radius: 12px; padding: 8px; display: flex; align-items: center; justify-content: center; }
.header h1 { color: white; font-size: 20px; font-weight: 700; }
.header p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 2px; }
.main { max-width: 560px; margin: 0 auto; padding: 20px 16px 40px; }
.upload-zone { border: 2px dashed #93c5fd; border-radius: 20px; padding: 32px 20px; text-align: center; cursor: pointer; background: white; transition: all 0.2s; margin-bottom: 14px; }
.upload-zone:hover, .upload-zone.drag { border-color: #1e40af; background: #eff6ff; }
.upload-icon { width: 52px; height: 52px; background: #eff6ff; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.upload-zone h2 { font-size: 15px; font-weight: 600; color: #1e3a8a; margin-bottom: 6px; }
.upload-zone p { font-size: 13px; color: #94a3b8; }
.camera-btn { width: 100%; padding: 13px; border-radius: 14px; border: 1.5px solid #1e40af; font-size: 14px; font-weight: 600; font-family: 'Noto Sans JP', sans-serif; color: #1e40af; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; transition: all 0.2s; }
.camera-btn:active { background: #eff6ff; }
.file-list { background: white; border-radius: 14px; border: 1px solid #e2e8f0; margin-bottom: 14px; overflow: hidden; display: none; }
.file-list-header { padding: 12px 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-size: 13px; font-weight: 600; color: #475569; display: flex; align-items: center; justify-content: space-between; }
.file-item { padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f1f5f9; }
.file-item:last-child { border-bottom: none; }
.file-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; background: #f1f5f9; flex-shrink: 0; }
.file-name { font-size: 13px; color: #334155; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-status { font-size: 11px; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; }
.file-status.waiting { background: #f1f5f9; color: #64748b; }
.file-status.analyzing { background: #fef9c3; color: #854d0e; }
.file-status.done { background: #dcfce7; color: #166534; }
.file-status.error { background: #fee2e2; color: #991b1b; }
.analyze-btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-size: 16px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; margin-bottom: 20px; }
.analyze-btn.ready { background: linear-gradient(135deg, #1e40af, #2563eb); color: white; box-shadow: 0 4px 15px rgba(30,64,175,0.3); }
.analyze-btn.ready:hover { transform: translateY(-2px); }
.analyze-btn.disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { animation: spin 1s linear infinite; }
.progress-bar { background: #e2e8f0; border-radius: 99px; height: 8px; margin-bottom: 20px; display: none; }
.progress-fill { background: linear-gradient(90deg, #1e40af, #10b981); height: 100%; border-radius: 99px; transition: width 0.3s ease; }
.progress-text { font-size: 13px; color: #64748b; text-align: center; margin-bottom: 8px; }
.summary-card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; padding: 16px; margin-bottom: 16px; display: none; }
.summary-title { font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.summary-item { background: #f8fafc; border-radius: 12px; padding: 12px; }
.summary-label { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
.summary-value { font-size: 18px; font-weight: 700; color: #1e293b; }
.summary-value.green { color: #059669; }
.result-table-wrap { background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; display: none; margin-bottom: 16px; }
.result-table-header { padding: 12px 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-size: 13px; font-weight: 600; color: #475569; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 10px 12px; text-align: left; font-weight: 600; color: #64748b; border-bottom: 1px solid #e2e8f0; background: #f8fafc; font-size: 12px; }
td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
.cat-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.cat-消耗品費 { background: #dbeafe; color: #1d4ed8; }
.cat-交通費 { background: #dcfce7; color: #15803d; }
.cat-接待交際費 { background: #f3e8ff; color: #7e22ce; }
.cat-通信費 { background: #ffedd5; color: #c2410c; }
.cat-広告宣伝費 { background: #fce7f3; color: #be185d; }
.cat-その他 { background: #f1f5f9; color: #475569; }
.cat-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
.cat-row:last-child { border-bottom: none; }
.cat-row-label { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.cat-row-amount { font-size: 13px; font-weight: 600; color: #1e293b; }
.csv-btn { width: 100%; padding: 13px; border-radius: 14px; border: 1.5px solid #10b981; font-size: 14px; font-weight: 600; font-family: 'Noto Sans JP', sans-serif; color: #10b981; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
.csv-btn:hover { background: #ecfdf5; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="m9 14 2 2 4-4"/></svg>
    </div>
    <h1>AI 確定申告アシスタント</h1>
  </div>
  <p>領収書をまとめてアップして自動仕訳</p>
</div>
<div class="main">
  <button class="camera-btn" onclick="document.getElementById('camera-input').click()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    カメラで撮影
  </button>
  <input type="file" id="camera-input" accept="image/*" capture="environment" hidden onchange="addFiles(this.files)">
  <div class="upload-zone" id="upload-zone"
    onclick="document.getElementById('file-input').click()"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="handleDrop(event)">
    <input type="file" id="file-input" accept="image/jpg,image/jpeg,image/png" multiple hidden onchange="addFiles(this.files)">
    <div class="upload-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <h2>複数枚まとめてアップロード</h2>
    <p>タップして選択（JPG / PNG・複数選択OK）</p>
  </div>
  <div class="file-list" id="file-list">
    <div class="file-list-header">
      <span id="file-count">0枚 選択中</span>
      <span onclick="clearFiles()" style="cursor:pointer;color:#ef4444;font-size:12px;">クリア</span>
    </div>
    <div id="file-items"></div>
  </div>
  <button class="analyze-btn disabled" id="analyze-btn" onclick="analyzeAll()" disabled>
    <svg id="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span id="btn-text">AI で一括解析</span>
  </button>
  <div class="progress-text" id="progress-text" style="display:none;"></div>
  <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="summary-card" id="summary-card" style="animation:fadeUp 0.3s ease;">
    <div class="summary-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      集計結果
    </div>
    <div class="summary-grid">
      <div class="summary-item"><div class="summary-label">解析枚数</div><div class="summary-value" id="s-count">0枚</div></div>
      <div class="summary-item"><div class="summary-label">合計金額</div><div class="summary-value green" id="s-total">¥0</div></div>
    </div>
    <div id="cat-summary"></div>
  </div>
  <div class="result-table-wrap" id="result-table-wrap" style="animation:fadeUp 0.4s ease;">
    <div class="result-table-header">明細一覧</div>
    <div style="overflow-x:auto;">
      <table><thead><tr><th>日付</th><th>店名</th><th>金額</th><th>勘定科目</th></tr></thead>
      <tbody id="result-tbody"></tbody></table>
    </div>
  </div>
  <button class="csv-btn" id="csv-btn" onclick="downloadCSV()" style="display:none;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    CSVでダウンロード
  </button>
</div>
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvn3tY2K58bl6bEGYTg2AIxGSCpOWWV29fl_kSX7Mbi68CbMXhgsSe1paBQR1Q53N0/exec";
let files = [], results = [];
function handleDrop(e) { e.preventDefault(); document.getElementById('upload-zone').classList.remove('drag'); addFiles(e.dataTransfer.files); }
function addFiles(newFiles) {
  for (const f of newFiles) { if (!f.type.startsWith('image/')) continue; if (files.find(x=>x.name===f.name&&x.size===f.size)) continue; files.push(f); }
  renderFileList();
}
function clearFiles() {
  files=[]; results=[];
  renderFileList();
  ['summary-card','result-table-wrap'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('csv-btn').style.display='none';
  document.getElementById('progress-bar').style.display='none';
  document.getElementById('progress-text').style.display='none';
}
function renderFileList() {
  const list=document.getElementById('file-list'), items=document.getElementById('file-items');
  const btn=document.getElementById('analyze-btn');
  if (files.length===0) { list.style.display='none'; btn.className='analyze-btn disabled'; btn.disabled=true; return; }
  list.style.display='block';
  document.getElementById('file-count').textContent=`${files.length}枚 選択中`;
  btn.className='analyze-btn ready'; btn.disabled=false;
  items.innerHTML='';
  files.forEach((f,i)=>{
    const div=document.createElement('div'); div.className='file-item'; div.id=`file-item-${i}`;
    const img=document.createElement('img'); img.className='file-thumb';
    const r=new FileReader(); r.onload=e=>img.src=e.target.result; r.readAsDataURL(f);
    const name=document.createElement('span'); name.className='file-name'; name.textContent=f.name;
    const status=document.createElement('span'); status.className='file-status waiting'; status.id=`status-${i}`; status.textContent='待機中';
    div.appendChild(img); div.appendChild(name); div.appendChild(status);
    items.appendChild(div);
  });
}
async function analyzeAll() {
  if (!files.length) return;
  const btn=document.getElementById('analyze-btn');
  btn.disabled=true; btn.className='analyze-btn disabled';
  document.getElementById('btn-icon').classList.add('spinner');
  document.getElementById('btn-text').textContent='解析中...';
  const pb=document.getElementById('progress-bar'), pf=document.getElementById('progress-fill'), pt=document.getElementById('progress-text');
  pb.style.display='block'; pt.style.display='block';
  results=[];
  for (let i=0;i<files.length;i++) {
    const st=document.getElementById(`status-${i}`);
    st.className='file-status analyzing'; st.textContent='解析中...';
    pt.textContent=`${i+1} / ${files.length} 枚を解析中...`;
    pf.style.width=`${(i/files.length)*100}%`;
    try { const r=await analyzeOne(files[i]); r._filename=files[i].name; results.push(r); st.className='file-status done'; st.textContent='完了'; }
    catch(e) { results.push({_filename:files[i].name,error:e.message}); st.className='file-status error'; st.textContent='エラー'; }
  }
  pf.style.width='100%'; pt.textContent=`${files.length}枚の解析が完了しました！`;
  btn.disabled=false; btn.className='analyze-btn ready';
  document.getElementById('btn-icon').classList.remove('spinner');
  document.getElementById('btn-text').textContent='もう一度解析';
  showResults();
}
function analyzeOne(file) {
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=async e=>{
      const base64=e.target.result.split(',')[1];
      try {
        const res=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:base64,filename:file.name})});
        const data=await res.json();
        if(data.error) throw new Error(data.error);
        resolve(data);
      } catch(err){reject(err);}
    };
    reader.readAsDataURL(file);
  });
}
function showResults() {
  const tbody=document.getElementById('result-tbody'); tbody.innerHTML='';
  let total=0; const catMap={};
  results.forEach(r=>{
    if(r.error) return;
    const amt=Number(r['金額'])||0; total+=amt;
    const cat=r['勘定科目']||'その他'; catMap[cat]=(catMap[cat]||0)+amt;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${r['日付']||'—'}</td><td>${r['店名']||'—'}</td><td style="font-weight:600;color:#059669;">${amt?'¥'+amt.toLocaleString():'—'}</td><td><span class="cat-badge cat-${cat}">${cat}</span></td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('s-count').textContent=`${results.filter(r=>!r.error).length}枚`;
  document.getElementById('s-total').textContent=`¥${total.toLocaleString()}`;
  const cs=document.getElementById('cat-summary'); cs.innerHTML='';
  Object.entries(catMap).sort((a,b)=>b[1]-a[1]).forEach(([cat,amt])=>{
    cs.innerHTML+=`<div class="cat-row"><div class="cat-row-label"><span class="cat-badge cat-${cat}">${cat}</span></div><div class="cat-row-amount">¥${amt.toLocaleString()}</div></div>`;
  });
  document.getElementById('summary-card').style.display='block';
  document.getElementById('result-table-wrap').style.display='block';
  document.getElementById('csv-btn').style.display='flex';
}
function downloadCSV() {
  const headers=['ファイル名','日付','店名','金額','品目','勘定科目'];
  const rows=results.map(r=>[r._filename||'',r['日付']||'',r['店名']||'',r['金額']||'',r['品目']||'',r['勘定科目']||'']);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`領収書_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.csv`;
  a.click(); URL.revokeObjectURL(url);
}
</script>
</body>
</html>
